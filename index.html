<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS SYSTEM CLOUD - MODERN UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, getDocs, deleteDoc, writeBatch, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZdCAoXdP0QfKJdnxBWzZ5vo4trhzsa74",
            authDomain: "ausmass-plaene.firebaseapp.com",
            projectId: "ausmass-plaene",
            storageBucket: "ausmass-plaene.firebasestorage.app",
            messagingSenderId: "270413900259",
            appId: "1:270413900259:web:642158e2858a9ad28058d6"
        };

        const appId = "ausmass-plaene-app";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allProjects = []; 
        let currentWeekStart = new Date(); 
        let currentFiles = []; 

        const CHUNK_SIZE = 850000; 

        // Authentifizierung initialisieren
        async function initAuth() {
            try {
                await setPersistence(auth, browserLocalPersistence);
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { await signInWithCustomToken(auth, __initial_auth_token); } 
                    catch (e) { await signInAnonymously(auth); }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { showStatus("AUTH ERROR", "error"); }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                setupProjectsListener();
            } else { initAuth(); }
        });

        // Status-Meldungen anzeigen
        function showStatus(msg, type = "success") {
            const status = document.getElementById('status-msg');
            if (!status) return;
            status.innerText = msg;
            const colors = { success: 'bg-blue-600', error: 'bg-red-600', info: 'bg-amber-500' };
            status.className = `fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white text-xs font-black uppercase tracking-widest shadow-2xl z-[500] transition-all duration-500 ${colors[type] || colors.success}`;
            status.style.opacity = "1";
            setTimeout(() => { if(status) { status.style.opacity = "0"; } }, 4000);
        }

        // Datei-Handling
        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            for (let file of files) {
                if (file.size > 15 * 1024 * 1024) { 
                    showStatus(`${file.name} ZU GROSS (MAX 15MB)`, "error");
                    continue;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    const fileData = {
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result, 
                        id: crypto.randomUUID(),
                        isNew: true
                    };
                    currentFiles.push(fileData);
                    renderFileList();
                    showStatus("PLAN HINZUGEFÜGT (LOKAL)");
                };
                reader.readAsDataURL(file);
            }
            event.target.value = ""; 
        }

        function renderFileList() {
            const list = document.getElementById('file-list');
            if (!list) return;
            list.innerHTML = '';
            if (currentFiles.length === 0) {
                list.innerHTML = '<div class="text-[10px] text-slate-400 font-black uppercase py-10 text-center italic tracking-widest">Keine Pläne hinterlegt</div>';
                return;
            }
            currentFiles.forEach(file => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/10 mb-2";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-slate-800 rounded-lg"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-width="2"></path></svg></div>
                        <div class="flex flex-col">
                            <span class="text-[11px] font-black text-white truncate max-w-[180px] uppercase italic">${file.name}</span>
                            <span class="text-[8px] text-blue-400 font-black uppercase tracking-widest">${(file.size / 1024 / 1024).toFixed(2)} MB</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="downloadFile('${file.id}')" class="text-white hover:text-blue-400 transition-colors">📥</button>
                        <button onclick="removeFile('${file.id}')" class="text-slate-500 hover:text-red-500 transition-colors">🗑️</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        window.downloadFile = (id) => {
            const file = currentFiles.find(f => f.id === id);
            if (!file || !file.data) { showStatus("DATEI NOCH NICHT GELADEN", "error"); return; }
            const link = document.createElement('a');
            link.href = file.data;
            link.download = file.name;
            link.click();
        };

        window.removeFile = (id) => {
            currentFiles = currentFiles.filter(f => f.id !== id);
            renderFileList();
        };

        // Echtzeit-Überwachung der Projekte
        function setupProjectsListener() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'projekte');
            onSnapshot(q, (snap) => {
                allProjects = [];
                snap.forEach(d => allProjects.push({ id: d.id, ...d.data() }));
                renderArchiv(document.getElementById('archiv-search')?.value || "");
                if(!document.getElementById('calendar-tab').classList.contains('hidden')) renderWorkWeek();
            });
        }

        // Speichern
        async function saveProjectWithFiles() {
            if(!currentUser) { showStatus("NICHT ANGEMELDET", "error"); return; }
            const data = getFormData();
            if(!data.projekt_id) { showStatus("PROJEKT-ID FEHLT!", "error"); return; }
            if(!data.datum) { showStatus("DATUM FEHLT!", "error"); return; }

            showStatus("SPEICHERE IN CLOUD...", "info");

            try {
                const projectRef = doc(db, 'artifacts', appId, 'public', 'data', 'projekte', data.projekt_id);
                const fileMetadata = currentFiles.map(f => ({ id: f.id, name: f.name, size: f.size, type: f.type }));
                await setDoc(projectRef, { ...data, files: fileMetadata }, { merge: true });

                for (let file of currentFiles) {
                    if (file.isNew && file.data) {
                        const str = file.data;
                        let partIndex = 0;
                        for (let i = 0; i < str.length; i += CHUNK_SIZE) {
                            const chunkContent = str.substring(i, i + CHUNK_SIZE);
                            const chunkRef = doc(db, 'artifacts', appId, 'public', 'data', 'projekte', data.projekt_id, 'fileData', file.id, 'chunks', `part_${partIndex}`);
                            await setDoc(chunkRef, { part: partIndex, content: chunkContent });
                            partIndex++;
                        }
                        file.isNew = false; 
                    }
                }
                showStatus("ERFOLGREICH GESPEICHERT");
                renderFileList();
                renderWorkWeek();
            } catch(e) { showStatus("SPEICHERFEHLER!", "error"); }
        }

        // Projekt laden
        async function loadProjectData(id) {
            try {
                showStatus("LADE PROJEKT...", "info");
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projekte', id));
                if(snap.exists()) {
                    const d = snap.data();
                    switchTab('form-tab');
                    const setVal = (fid, val) => { const el = document.getElementById(fid); if(el) el.value = val || ''; };
                    setVal('projekt_id', id);
                    setVal('adresse', d.adresse);
                    setVal('datum', d.datum);
                    setVal('pl_intern', d.pl_intern);
                    setVal('zeichner', d.zeichner);
                    setVal('kunde', d.kunde);
                    setVal('pl_extern', d.pl_extern);
                    setVal('tel_bauleitung', d.tel_bauleitung);
                    setVal('tel_monteur', d.tel_monteur);
                    setVal('verantwortlicher', d.verantwortlicher);
                    setVal('interne_infos', d.interne_infos);
                    setVal('baustellen_protokoll', d.baustellen_protokoll);
                    
                    document.querySelectorAll('input[name="art"]').forEach(rb => rb.checked = (rb.value === d.auftragsart));
                    document.querySelectorAll('input[name="mr"]').forEach(rb => rb.checked = (rb.value === d.mr_status));
                    document.querySelectorAll('.etage-cb').forEach(cb => { 
                        cb.checked = (d.etagen || []).includes(cb.value); 
                        updateEtageStyle(cb); 
                    });
                    currentFiles = d.files || [];
                    renderFileList();
                    for (let file of currentFiles) { loadFileDataChunks(id, file.id); }
                    closeArchiv();
                    showStatus("PROJEKT GELADEN");
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch (e) { showStatus("FEHLER BEIM LADEN", "error"); }
        }

        async function loadFileDataChunks(projectId, fileId) {
            try {
                const chunksColl = collection(db, 'artifacts', appId, 'public', 'data', 'projekte', projectId, 'fileData', fileId, 'chunks');
                const chunkSnap = await getDocs(chunksColl);
                let chunkMap = [];
                chunkSnap.forEach(doc => { const c = doc.data(); chunkMap.push({ part: c.part, content: c.content }); });
                chunkMap.sort((a, b) => a.part - b.part);
                const fullBase64 = chunkMap.map(c => c.content).join('');
                const idx = currentFiles.findIndex(f => f.id === fileId);
                if (idx !== -1) { currentFiles[idx].data = fullBase64; currentFiles[idx].isNew = false; }
            } catch (e) {}
        }

        function getFormData() {
            return {
                auftragsart: document.querySelector('input[name="art"]:checked')?.value || '',
                verantwortlicher: document.getElementById('verantwortlicher')?.value || '',
                projekt_id: document.getElementById('projekt_id')?.value.trim() || '',
                adresse: document.getElementById('adresse')?.value || '',
                datum: document.getElementById('datum')?.value || '', 
                pl_intern: document.getElementById('pl_intern')?.value || '',
                zeichner: document.getElementById('zeichner')?.value || '',
                kunde: document.getElementById('kunde')?.value || '',
                pl_extern: document.getElementById('pl_extern')?.value || '',
                tel_bauleitung: document.getElementById('tel_bauleitung')?.value || '',
                tel_monteur: document.getElementById('tel_monteur')?.value || '',
                mr_status: document.querySelector('input[name="mr"]:checked')?.value || '',
                etagen: Array.from(document.querySelectorAll('.etage-cb:checked')).map(cb => cb.value),
                interne_infos: document.getElementById('interne_infos')?.value || '',
                baustellen_protokoll: document.getElementById('baustellen_protokoll')?.value || '',
                lastUpdated: new Date().toISOString()
            };
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId)?.classList.remove('hidden');
            if(tabId === 'calendar-tab') renderWorkWeek();
        }

        function getMonday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - (day === 0 ? 6 : day - 1);
            const monday = new Date(date.setDate(diff));
            monday.setHours(0, 0, 0, 0);
            return monday;
        }

        // Archiv rendern mit Löschfunktion
        function renderArchiv(filterText = "") {
            const list = document.getElementById('archiv-liste');
            if(!list) return;
            list.innerHTML = '';
            const lowerFilter = filterText.toLowerCase().trim();
            const filtered = allProjects.filter(p => 
                p.id.toLowerCase().includes(lowerFilter) || 
                (p.adresse || "").toLowerCase().includes(lowerFilter) ||
                (p.kunde || "").toLowerCase().includes(lowerFilter)
            );

            if(filtered.length === 0) {
                list.innerHTML = '<tr><td colspan="3" class="p-20 text-center text-[10px] font-black uppercase text-slate-500 italic">Keine Einträge gefunden</td></tr>';
                return;
            }

            filtered.sort((a, b) => new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0)).forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "group border-b border-white/5 hover:bg-white/[0.02] cursor-pointer transition-colors";
                tr.onclick = (e) => { if (!e.target.closest('button')) loadProjectData(p.id); };
                tr.innerHTML = `
                    <td class="p-6">
                        <div class="flex flex-col">
                            <span class="text-[12px] font-black uppercase italic text-white tracking-tight">${p.id}</span>
                            <span class="text-[9px] font-bold text-blue-500 uppercase tracking-widest mt-1">${p.kunde || 'KEIN KUNDE'}</span>
                        </div>
                    </td>
                    <td class="p-6">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-slate-400 uppercase italic truncate max-w-[200px]">${p.adresse || '-'}</span>
                            <span class="text-[8px] font-black text-slate-600 uppercase mt-1">${p.datum ? new Date(p.datum).toLocaleDateString('de-DE') : 'KEIN DATUM'}</span>
                        </div>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="deleteProject('${p.id}', event)" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all opacity-0 group-hover:opacity-100">
                            Löschen
                        </button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        window.deleteProject = async (id, event) => {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            
            // Custom Confirmation
            const confirmed = confirm(`ACHTUNG: Möchtest du das Projekt "${id}" unwiderruflich aus der Cloud löschen? Alle Pläne und Daten gehen verloren.`);
            if (!confirmed) return;

            showStatus("LÖSCHE PROJEKT...", "info");
            try {
                // Lösche Hauptdokument
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projekte', id));
                
                // Hinweis: Unterkollektionen (Chunks) werden in Firestore nicht automatisch gelöscht, 
                // müssten aber manuell bereinigt werden, falls Speicherplatz kritisch ist.
                
                showStatus(`PROJEKT "${id}" ENTFERNT`, "success");
            } catch (e) {
                console.error(e);
                showStatus("FEHLER BEIM LÖSCHEN", "error");
            }
        };

        // Kalender Logik
        function renderWorkWeek() {
            const container = document.getElementById('work-week-grid');
            const weekLabel = document.getElementById('week-label');
            if(!container) return;
            container.innerHTML = '';
            const monday = getMonday(new Date(currentWeekStart));
            const friday = new Date(monday); friday.setDate(monday.getDate() + 4);
            weekLabel.innerText = `KW ${getWeekNumber(monday)} | ${monday.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'})} - ${friday.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'})}`;
            
            const timeCol = document.createElement('div');
            timeCol.className = "col-span-1 border-r border-slate-200 mt-12 bg-slate-50";
            for(let h=7; h<=19; h++) {
                const hour = document.createElement('div');
                hour.className = "h-[80px] text-[10px] font-black text-slate-400 pr-4 text-right border-t border-slate-100 flex items-start justify-end pt-1";
                hour.innerText = `${h}:00`;
                timeCol.appendChild(hour);
            }
            container.appendChild(timeCol);

            for(let i=0; i<5; i++) {
                const dayDate = new Date(monday); dayDate.setDate(monday.getDate() + i);
                const dayStr = dayDate.getFullYear() + "-" + String(dayDate.getMonth() + 1).padStart(2, '0') + "-" + String(dayDate.getDate()).padStart(2, '0');

                const dayCol = document.createElement('div');
                dayCol.className = "col-span-2 relative min-h-[1040px] border-r border-slate-100 bg-white/50";
                const isToday = new Date().toDateString() === dayDate.toDateString();
                dayCol.innerHTML = `<div class="h-12 text-center flex flex-col justify-center border-b border-slate-200 sticky top-0 z-30 ${isToday ? 'bg-blue-600' : 'bg-slate-100'}"><span class="text-[9px] font-black uppercase ${isToday ? 'text-blue-100' : 'text-slate-500'}">${dayDate.toLocaleDateString('de-DE', {weekday: 'short'})}</span><span class="text-xs font-black ${isToday ? 'text-white' : 'text-slate-900'}">${dayDate.getDate()}.${dayDate.getMonth()+1}.</span></div>`;
                
                for(let h=7; h<=19; h++) {
                    const slot = document.createElement('div');
                    slot.className = "h-[80px] border-t border-slate-100 w-full";
                    dayCol.appendChild(slot);
                }
                
                allProjects.filter(p => p.datum && p.datum.split('T')[0] === dayStr).forEach(p => {
                    const timeParts = p.datum.split('T');
                    const [hours, minutes] = timeParts[1].split(':');
                    const hNum = parseInt(hours);
                    const mNum = parseInt(minutes);
                    
                    if(hNum >= 7 && hNum < 20) {
                        const topPos = ((hNum - 7) * 80) + (mNum / 60 * 80) + 48; 
                        const entry = document.createElement('div');
                        entry.className = "absolute left-1 right-1 bg-white border-2 border-blue-500 p-2 rounded-xl shadow-lg z-20 cursor-pointer overflow-hidden flex flex-col justify-center transition-transform hover:scale-[1.02]";
                        entry.style.top = `${topPos}px`; 
                        entry.style.height = "76px"; 
                        entry.innerHTML = `<div class="flex justify-between items-start"><span class="text-[10px] font-black truncate text-blue-600 uppercase italic">${p.id}</span><span class="text-[8px] font-black text-slate-400">${hours}:${minutes}</span></div><div class="text-[9px] text-slate-900 font-bold truncate">${p.adresse || '...'}</div>`;
                        entry.onclick = () => loadProjectData(p.id);
                        dayCol.appendChild(entry);
                    }
                });
                container.appendChild(dayCol);
            }
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        }

        function updateEtageStyle(cb) {
            const label = cb.closest('.etage-label');
            if(!label) return;
            if(cb.checked) {
                label.classList.add('border-blue-500', 'text-blue-600', 'bg-blue-50');
                label.classList.remove('border-slate-100', 'text-slate-900');
            } else {
                label.classList.remove('border-blue-500', 'text-blue-600', 'bg-blue-50');
                label.classList.add('border-slate-100', 'text-slate-900');
            }
        }

        // Globale Exports
        window.saveToCloud = saveProjectWithFiles;
        window.switchTab = switchTab;
        window.changeWeek = (o) => { 
            const d = new Date(currentWeekStart);
            d.setDate(d.getDate() + (o * 7));
            currentWeekStart = d;
            renderWorkWeek(); 
        };
        window.updateEtageStyle = updateEtageStyle;
        window.openArchiv = () => { document.getElementById('archiv-modal').classList.remove('hidden'); renderArchiv(); };
        window.closeArchiv = () => { document.getElementById('archiv-modal').classList.add('hidden'); };
        window.resetForm = () => { if(confirm("Neues Projekt starten? Alle ungespeicherten Daten gehen verloren.")) location.reload(); };
        window.handleSearch = (el) => renderArchiv(el.value);
        window.handleFileUpload = handleFileUpload;

    </script>
    <style>

        .btn-blue { background: #2563eb; color: #fff; font-weight: 900; text-transform: uppercase; border-radius: 1.25rem; padding: 1.25rem; font-size: 0.75rem; letter-spacing: 0.1em; width: 100%; transition: all 0.3s; box-shadow: 0 10px 30px -5px rgba(37,99,235,0.4); }
        .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 15px 35px -5px rgba(37,99,235,0.5); }
        .btn-white { background: #ffffff; color: #0f172a; font-weight: 900; text-transform: uppercase; border-radius: 1.25rem; padding: 1.25rem; font-size: 0.75rem; letter-spacing: 0.1em; width: 100%; border: 2px solid #e2e8f0; }

        .mr-card { border: 2px solid #e2e8f0; border-radius: 1.5rem; padding: 1.25rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-style: italic; font-size: 9px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .mr-card:hover { border-color: #2563eb; }
        .mr-card.red { color: #ef4444; border-color: #fee2e2; }
        .mr-card input { appearance: none; width: 16px; height: 16px; border: 2px solid #cbd5e1; border-radius: 50%; outline: none; }
        .mr-card input:checked { border-color: #2563eb; background: #2563eb; box-shadow: inset 0 0 0 2px #fff; }
        .dark-box { background: #0f172a; border-radius: 2.5rem; color: white; padding: 2.5rem; }
        .blue-box { background: #1e3a8a; border-radius: 2.5rem; color: white; padding: 2.5rem; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

    <div id="status-msg" class="fixed opacity-0 pointer-events-none z-[1000]"></div>

    <!-- Archiv Modal -->
    <div id="archiv-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl z-[2000] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-4xl rounded-[3rem] border border-white/10 overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-10 border-b border-white/5 flex justify-between items-center">
                <div>
                    <h3 class="font-black text-white uppercase italic text-2xl tracking-tighter">OBJEKT <span class="text-blue-500">ARCHIV</span></h3>
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1">Verwalte deine Cloud-Projekte</p>
                </div>
                <button onclick="closeArchiv()" class="bg-white/5 hover:bg-white/10 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl font-light transition-all">&times;</button>
            </div>
            <div class="p-8 bg-white/5">
                <div class="relative">
                    <input type="text" id="archiv-search" oninput="handleSearch(this)" placeholder="NACH NAME, ADRESSE ODER KUNDE SUCHEN..." class="w-full bg-slate-950 border border-white/10 rounded-2xl py-5 px-8 text-sm font-black text-white outline-none italic uppercase focus:border-blue-500 transition-all">
                    <div class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-700">🔍</div>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <table class="w-full border-separate border-spacing-y-2">
                    <tbody id="archiv-liste"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto space-y-10">
        
        <!-- Header -->
        <header class="flex justify-between items-center no-print">
            <div class="flex items-center gap-2">
                <span class="text-3xl font-black italic tracking-tighter uppercase text-blue-600">GIS</span>
                <span class="text-3xl font-black italic tracking-tighter uppercase text-slate-900">CLOUD</span>
            </div>
            <div class="flex gap-4">
                <button onclick="resetForm()" class="bg-white text-slate-900 border border-slate-200 font-black px-8 py-3 rounded-2xl text-[10px] uppercase italic tracking-widest shadow-sm hover:bg-slate-50 transition-all">Neues Objekt</button>
                <button onclick="openArchiv()" class="bg-slate-900 text-white font-black px-8 py-3 rounded-2xl text-[10px] uppercase italic tracking-widest shadow-lg shadow-slate-900/30 hover:scale-105 transition-all">Projekt öffnen / Archiv</button>
            </div>
        </header>

        <!-- Tabs Switch -->
        <div class="flex justify-center no-print">
            <div class="bg-white p-1.5 rounded-2xl flex gap-1 shadow-sm border border-slate-200">
                <button onclick="switchTab('form-tab')" class="px-8 py-3 rounded-xl text-[10px] font-black uppercase italic tracking-widest transition-all hover:bg-slate-50">📋 Auftrag</button>
                <button onclick="switchTab('calendar-tab')" class="px-8 py-3 rounded-xl text-[10px] font-black uppercase italic tracking-widest transition-all hover:bg-slate-50">📅 Kalender</button>
            </div>
        </div>

        <!-- Form Tab -->
        <div id="form-tab" class="tab-content space-y-12">
            
            <div class="bg-card p-8 md:p-14 space-y-16">
                
                <!-- 00 Status -->
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 border-b border-slate-100 pb-10">
                    <div class="flex gap-12">
                        <label class="radio-tag text-blue-600"><input type="radio" name="art" value="Ausmessen" checked> Ausmessen</label>
                        <label class="radio-tag text-slate-400"><input type="radio" name="art" value="Service"> Service</label>
                    </div>
                    <div class="w-full md:w-64">
                        <label class="label-cap">Verantwortlicher</label>
                        <input type="text" id="verantwortlicher" class="input-box italic" placeholder="NAME">
                    </div>
                </div>

                <!-- 01 Projektstamm -->
                <section>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="section-num">01</div>
                        <h3 class="font-black uppercase italic tracking-tighter text-lg">Projektstamm</h3>
                    </div>

                    <div class="bg-slate-50 p-10 rounded-[2.5rem] mb-12 border-2 border-slate-100">
                        <label class="label-cap">Objektbezeichnung / Cloud-ID (Pflichtfeld)</label>
                        <input type="text" id="projekt_id" class="w-full bg-transparent border-none outline-none font-black text-2xl md:text-3xl uppercase italic text-blue-600 placeholder:text-slate-200" placeholder="NAME DES OBJEKTS">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
                        <div class="flex flex-col">
                            <label class="label-cap">Adresse / Einsatzort</label>
                            <input type="text" id="adresse" class="input-box italic" placeholder="STRASSE NR, PLZ ORT">
                        </div>
                        <div class="flex flex-col">
                            <label class="label-cap">Datum / Zeit</label>
                            <input type="datetime-local" id="datum" class="input-box">
                        </div>
                        <div class="grid grid-cols-2 gap-8">
                            <div class="flex flex-col"><label class="label-cap">PL Intern</label><input type="text" id="pl_intern" class="input-box italic"></div>
                            <div class="flex flex-col"><label class="label-cap">Zeichner</label><input type="text" id="zeichner" class="input-box italic"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-8">
                            <div class="flex flex-col"><label class="label-cap">Kunde</label><input type="text" id="kunde" class="input-box italic"></div>
                            <div class="flex flex-col"><label class="label-cap">PL Extern</label><input type="text" id="pl_extern" class="input-box italic"></div>
                        </div>
                        <div class="flex flex-col">
                            <label class="label-cap">Tel. Bauleitung</label>
                            <input type="text" id="tel_bauleitung" class="input-box italic">
                        </div>
                        <div class="flex flex-col">
                            <label class="label-cap">Tel. Monteur</label>
                            <input type="text" id="tel_monteur" class="input-box italic" placeholder="M: +41...">
                        </div>
                    </div>
                </section>

                <!-- 02 & 03 Meterriss & Etagen -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                    <section>
                        <div class="flex items-center gap-4 mb-8">
                            <div class="section-num">02</div>
                            <h3 class="font-black uppercase italic tracking-tighter text-lg">Meterriss</h3>
                        </div>
                        <div class="space-y-3">
                            <label class="mr-card">MR Plaquette <input type="radio" name="mr" value="Vorhanden"></label>
                            <label class="mr-card">MR Bleistift <input type="radio" name="mr" value="Fehlt"></label>
                            <label class="mr-card red">Kein Meterriss <input type="radio" name="mr" value="Keiner"></label>
                        </div>
                    </section>

                    <section>
                        <div class="flex items-center gap-4 mb-8">
                            <div class="section-num">03</div>
                            <h3 class="font-black uppercase italic tracking-tighter text-lg">Etagen</h3>
                        </div>
                        <div class="grid grid-cols-4 gap-2 mb-6">
                            <script>
                                const levels = ["UG", "EG", "1.OG", "2.OG", "3.OG", "4.OG", "5.OG", "6.OG", "7.OG", "8.OG", "9.OG", "10.OG"];
                                levels.forEach(e => {
                                    document.write(`<label class="etage-label"><input type="checkbox" value="${e}" class="hidden etage-cb" onchange="updateEtageStyle(this)">${e}</label>`);
                                });
                            </script>
                        </div>
                        <div class="space-y-3">
                            <label class="flex items-center gap-3 text-[10px] font-black uppercase italic text-slate-500 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded-md border-2 border-slate-200 checked:bg-blue-600 transition-all"> Kunde anvisiert
                            </label>
                            <label class="flex items-center gap-3 text-[10px] font-black uppercase italic text-slate-500 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded-md border-2 border-slate-200 checked:bg-blue-600 transition-all"> Polier informiert
                            </label>
                        </div>
                    </section>
                </div>

                <!-- Info Boxen -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="blue-box">
                        <label class="label-cap text-blue-200">Büro Infos</label>
                        <textarea id="interne_infos" class="w-full bg-blue-800/40 border-none outline-none p-6 rounded-2xl font-bold text-sm italic mt-4 min-h-[160px] text-white placeholder:text-blue-400" placeholder="Details für das Büro..."></textarea>
                    </div>
                    <div class="dark-box">
                        <label class="label-cap text-slate-400">Baustellen-Protokoll</label>
                        <textarea id="baustellen_protokoll" class="w-full bg-slate-800/50 border-none outline-none p-6 rounded-2xl font-bold text-sm italic mt-4 min-h-[160px] text-white placeholder:text-slate-600" placeholder="Rückmeldung von vor Ort..."></textarea>
                    </div>
                </div>

                <!-- Plan Cloud -->
                <section class="bg-slate-950 p-10 rounded-[3rem] shadow-2xl">
                    <h3 class="font-black italic uppercase text-white text-2xl mb-10 tracking-tighter">PLAN <span class="text-blue-500">CLOUD</span></h3>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <label class="border-2 border-dashed border-white/10 rounded-[2rem] p-12 flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 transition-all group">
                            <input type="file" multiple accept=".pdf" onchange="handleFileUpload(event)" class="hidden">
                            <div class="bg-blue-600 p-4 rounded-2xl mb-4 shadow-lg shadow-blue-600/20"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke-width="3"></path></svg></div>
                            <span class="text-[10px] font-black uppercase tracking-widest text-white italic">Datei hochladen</span>
                        </label>
                        <div id="file-list" class="space-y-3"></div>
                    </div>
                </section>

                <!-- Footer Actions -->
                <div class="flex flex-col md:flex-row gap-4 pt-10 no-print">
                    <button onclick="saveToCloud()" class="btn-blue flex items-center justify-center gap-4">
                        💾 DATEN IN CLOUD SICHERN
                    </button>
                    <button onclick="window.print()" class="btn-white flex items-center justify-center gap-4">
                        🖨️ ALS PDF EXPORTIEREN
                    </button>
                </div>

            </div>
        </div>

        <!-- Calendar Tab -->
        <div id="calendar-tab" class="tab-content hidden">
            <div class="bg-card p-0 overflow-hidden border border-slate-200">
                <div class="flex justify-between items-center p-8 bg-slate-50 border-b border-slate-200">
                    <h2 id="week-label" class="text-xl font-black italic text-slate-900 tracking-tighter uppercase">KALENDER</h2>
                    <div class="flex gap-2">
                        <button onclick="changeWeek(-1)" class="w-12 h-12 bg-white border border-slate-200 rounded-xl text-slate-900 font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">←</button>
                        <button onclick="changeWeek(1)" class="w-12 h-12 bg-white border border-slate-200 rounded-xl text-slate-900 font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">→</button>
                    </div>
                </div>
                <div id="work-week-grid" class="grid grid-cols-11 overflow-x-auto min-w-[1000px] bg-white"></div>
            </div>
        </div>

    </div>

</body>
</html>
